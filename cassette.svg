<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <style>
      .reel-left {
        transform-origin: 118px 118px;
        animation: spin 3s linear infinite;
      }
      .reel-right {
        transform-origin: 282px 118px;
        animation: spin 3s linear infinite;
      }
      .tape-left {
        transform-origin: 118px 118px;
        animation: spin 3s linear infinite;
      }
      .tape-right {
        transform-origin: 282px 118px;
        animation: spin 3s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- Noise texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Body -->
  <rect x="20" y="40" width="360" height="160" rx="12" ry="12" fill="#3a3a4a"/>
  <rect x="24" y="44" width="352" height="152" rx="10" ry="10" fill="#424252"/>

  <!-- Label area -->
  <rect x="60" y="50" width="280" height="75" rx="4" ry="4" fill="#e8e0d0"/>
  <!-- Label red stripe -->
  <rect x="60" y="50" width="280" height="22" rx="4" ry="4" fill="#d45a4a"/>
  <rect x="60" y="64" width="280" height="8" fill="#d45a4a"/>

  <!-- Label text -->
  <text x="75" y="66" font-family="monospace" font-size="11" font-weight="bold" fill="white">B</text>
  <text x="200" y="66" font-family="monospace" font-size="8" fill="white" text-anchor="middle">N.R. [    ] IN OUT</text>
  <text x="200" y="100" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">Normal Bias 120μs EQ</text>
  <rect x="310" y="88" width="24" height="16" rx="2" fill="#d45a4a"/>
  <text x="322" y="100" font-family="monospace" font-size="8" font-weight="bold" fill="white" text-anchor="middle">60</text>
  <text x="303" y="100" font-family="monospace" font-size="9" fill="#d45a4a">A|</text>

  <!-- Horizontal lines on label -->
  <line x1="80" y1="78" x2="175" y2="78" stroke="#aaa" stroke-width="1"/>
  <line x1="80" y1="82" x2="175" y2="82" stroke="#aaa" stroke-width="1"/>
  <line x1="80" y1="86" x2="175" y2="86" stroke="#aaa" stroke-width="1"/>
  <line x1="225" y1="78" x2="295" y2="78" stroke="#aaa" stroke-width="1"/>
  <line x1="225" y1="82" x2="295" y2="82" stroke="#aaa" stroke-width="1"/>
  <line x1="225" y1="86" x2="295" y2="86" stroke="#aaa" stroke-width="1"/>

  <!-- Window cutout -->
  <rect x="70" y="130" width="260" height="60" rx="6" ry="6" fill="#2a2a38"/>
  <rect x="74" y="134" width="252" height="52" rx="4" ry="4" fill="#1a1a28"/>

  <!-- Tape bridge/guide in center -->
  <rect x="183" y="148" width="34" height="28" rx="2" fill="#4a4a5a"/>
  <rect x="187" y="152" width="26" height="20" rx="1" fill="#3a3a48"/>
  <!-- tape line -->
  <path d="M118 155 Q150 165 183 158" stroke="#222" stroke-width="3" fill="none"/>
  <path d="M282 155 Q250 165 217 158" stroke="#222" stroke-width="3" fill="none"/>

  <!-- LEFT REEL -->
  <g class="reel-left">
    <!-- outer ring -->
    <circle cx="118" cy="118" r="32" fill="#3a3a4a" stroke="#5a5a6a" stroke-width="2"/>
    <!-- spokes -->
    <line x1="118" y1="88" x2="118" y2="98" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="118" y1="138" x2="118" y2="148" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="88" y1="118" x2="98" y2="118" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="138" y1="118" x2="148" y2="118" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="96" y1="96" x2="103" y2="103" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="133" y1="133" x2="140" y2="140" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="140" y1="96" x2="133" y2="103" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="103" y1="133" x2="96" y2="140" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <!-- hub -->
    <circle cx="118" cy="118" r="14" fill="#5a6a7a"/>
    <circle cx="118" cy="118" r="8" fill="#3a4a5a"/>
    <circle cx="118" cy="118" r="4" fill="#2a3a4a"/>
  </g>

  <!-- RIGHT REEL -->
  <g class="reel-right">
    <circle cx="282" cy="118" r="32" fill="#3a3a4a" stroke="#5a5a6a" stroke-width="2"/>
    <line x1="282" y1="88" x2="282" y2="98" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="282" y1="138" x2="282" y2="148" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="252" y1="118" x2="262" y2="118" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="302" y1="118" x2="312" y2="118" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="260" y1="96" x2="267" y2="103" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="297" y1="133" x2="304" y2="140" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="304" y1="96" x2="297" y2="103" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <line x1="267" y1="133" x2="260" y2="140" stroke="#7a8a9a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="282" cy="118" r="14" fill="#5a6a7a"/>
    <circle cx="282" cy="118" r="8" fill="#3a4a5a"/>
    <circle cx="282" cy="118" r="4" fill="#2a3a4a"/>
  </g>

  <!-- Bottom screws -->
  <circle cx="90" cy="188" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="87" y1="188" x2="93" y2="188" stroke="#666" stroke-width="1.5"/>
  <line x1="90" y1="185" x2="90" y2="191" stroke="#666" stroke-width="1.5"/>

  <circle cx="200" cy="188" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="197" y1="188" x2="203" y2="188" stroke="#666" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="200" y2="191" stroke="#666" stroke-width="1.5"/>

  <circle cx="310" cy="188" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="307" y1="188" x2="313" y2="188" stroke="#666" stroke-width="1.5"/>
  <line x1="310" y1="185" x2="310" y2="191" stroke="#666" stroke-width="1.5"/>

  <!-- Bottom plugs -->
  <circle cx="140" cy="195" r="5" fill="#5a8a9a" stroke="#4a7a8a" stroke-width="1"/>
  <circle cx="200" cy="200" r="5" fill="#5a8a9a" stroke="#4a7a8a" stroke-width="1"/>
  <circle cx="260" cy="195" r="5" fill="#5a8a9a" stroke="#4a7a8a" stroke-width="1"/>

  <!-- Corner screws -->
  <circle cx="36" cy="56" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="33" y1="56" x2="39" y2="56" stroke="#666" stroke-width="1.5"/>
  <line x1="36" y1="53" x2="36" y2="59" stroke="#666" stroke-width="1.5"/>

  <circle cx="364" cy="56" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="361" y1="56" x2="367" y2="56" stroke="#666" stroke-width="1.5"/>
  <line x1="364" y1="53" x2="364" y2="59" stroke="#666" stroke-width="1.5"/>

  <circle cx="36" cy="184" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="33" y1="184" x2="39" y2="184" stroke="#666" stroke-width="1.5"/>
  <line x1="36" y1="181" x2="36" y2="187" stroke="#666" stroke-width="1.5"/>

  <circle cx="364" cy="184" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="361" y1="184" x2="367" y2="184" stroke="#666" stroke-width="1.5"/>
  <line x1="364" y1="181" x2="364" y2="187" stroke="#666" stroke-width="1.5"/>
</svg>
